<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none">
  <!-- BYS Recykling Logo -->
  <g fill="#0066B2">
    <!-- Bull/Bison silhouette -->
    <path d="M10 65 C10 45, 15 30, 25 22 C30 18, 32 12, 28 5 C34 10, 38 14, 35 22 C42 15, 52 12, 60 14 C68 12, 78 15, 85 22 C82 14, 86 10, 92 5 C88 12, 90 18, 95 22 C105 30, 110 45, 110 65 C110 80, 100 92, 85 95 L85 105 L75 105 L75 95 C70 96, 50 96, 45 95 L45 105 L35 105 L35 95 C20 92, 10 80, 10 65Z"/>
    <!-- Eye -->
    <circle cx="45" cy="45" r="4" fill="white"/>
    <circle cx="45" cy="45" r="2" fill="#0066B2"/>
    <!-- Nostril -->
    <ellipse cx="30" cy="65" rx="3" ry="4" fill="white" opacity="0.3"/>
    <!-- Horn detail -->
    <path d="M30 22 C28 15, 30 8, 28 5" stroke="white" stroke-width="1" fill="none" opacity="0.3"/>
    
    <!-- Recycling arrows on bull body -->
    <g transform="translate(55, 45) scale(0.35)" fill="white" opacity="0.9">
      <path d="M25 0 L35 17 L25 14 L15 17Z"/>
      <path d="M35 17 C45 17, 50 25, 48 35 L42 30 C43 24, 40 20, 35 19Z"/>
      <path d="M48 35 L58 35 L48 52 L38 35Z"/>
      <path d="M48 52 C42 62, 30 64, 22 58 L28 54 C33 58, 40 56, 44 50Z"/>
      <path d="M22 58 L12 52 L25 45 L25 58Z"/>
      <path d="M12 52 C6 42, 10 30, 18 24 L20 30 C14 35, 12 42, 16 48Z"/>
    </g>
    
    <!-- BYS Text -->
    <text x="125" y="55" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="48" fill="#0066B2" letter-spacing="2">BYŚ</text>
    
    <!-- RECYKLING Text -->
    <text x="125" y="80" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#0066B2" letter-spacing="5">RECYKLING</text>
  </g>
</svg>
